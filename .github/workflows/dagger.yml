name: dagger
on:
  push:
    branches: [main, anam_test]

jobs:
  test:
    name: test
    runs-on: depot-ubuntu-22.04,dagger=0.19.9
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Test
        uses: dagger/dagger-for-github@v8.2.0
        with:
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          verb: call
          args: test --dir .
